spring:
  application:
    name: equipment-management-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/equipment_management?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:disabled}
      password: ${SPRING_SECURITY_USER_PASSWORD:disabled}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.web: info
    org.hibernate.SQL: debug

app:
  upload:
    lab-image-dir: ${LAB_IMAGE_DIR:uploads/labs}
  security:
    jwt-secret: ${JWT_SECRET:ems-dev-secret-please-change-32bytes-min!!}
    jwt-expire-minutes: ${JWT_EXPIRE_MINUTES:720}

